<!-- ================= LIGHTBOX ================= -->
<div id="lightbox"
     class="hidden fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-50 transition">

  <!-- CLOSE -->
  <span onclick="closeViewer()"
        class="absolute top-5 right-8 text-white text-4xl cursor-pointer z-50">&times;</span>

  <!-- COUNTER -->
  <div id="imageCounter"
       class="absolute top-5 left-8 text-white z-50"></div>

  <!-- PREV -->
  <button onclick="prevImage()"
          class="absolute left-5 text-white text-5xl z-50">&#10094;</button>

  <!-- IMAGE -->
  <img id="lightboxImg"
       class="max-h-[80vh] max-w-[90vw] rounded-lg transition-transform duration-200">

  <!-- NEXT -->
  <button onclick="nextImage()"
          class="absolute right-5 text-white text-5xl z-50">&#10095;</button>

  <!-- CAPTION -->
  <p id="lightboxCaption"
     class="absolute bottom-10 text-white text-lg text-center w-full"></p>

</div>

<!-- ================= SCRIPT ================= -->
<script>

let albums = {};
let currentAlbum = [];
let currentIndex = 0;
let scale = 1;

// AUTO BUILD
document.querySelectorAll('.gallery-img').forEach((img) => {
  const album = img.dataset.album;

  if (!albums[album]) albums[album] = [];

  const index = albums[album].length;

  albums[album].push({
    src: img.src,
    caption: img.dataset.caption
  });

  img.addEventListener('click', () => openViewer(album, index));
});

// OPEN
function openViewer(albumName, index) {
  currentAlbum = albums[albumName];
  currentIndex = index;
  scale = 1;
  showImage();

  document.getElementById('lightbox').classList.remove('hidden');
}

// SHOW
function showImage() {
  const img = currentAlbum[currentIndex];
  const el = document.getElementById('lightboxImg');

  el.src = img.src;
  el.style.transform = "scale(1)";

  document.getElementById('lightboxCaption').innerText = img.caption;
  document.getElementById('imageCounter').innerText =
    (currentIndex + 1) + " / " + currentAlbum.length;
}

// NAV
function nextImage() {
  currentIndex = (currentIndex + 1) % currentAlbum.length;
  showImage();
}

function prevImage() {
  currentIndex = (currentIndex - 1 + currentAlbum.length) % currentAlbum.length;
  showImage();
}

// CLOSE
function closeViewer() {
  document.getElementById('lightbox').classList.add('hidden');
}

// KEYBOARD SUPPORT
document.addEventListener('keydown', (e) => {
  if (document.getElementById('lightbox').classList.contains('hidden')) return;

  if (e.key === "ArrowRight") nextImage();
  if (e.key === "ArrowLeft") prevImage();
  if (e.key === "Escape") closeViewer();
});

// SWIPE
let startX = 0;
let endX = 0;

lightbox.addEventListener('touchstart', e => startX = e.touches[0].clientX);
lightbox.addEventListener('touchmove', e => endX = e.touches[0].clientX);
lightbox.addEventListener('touchend', () => {
  let diff = startX - endX;
  if (Math.abs(diff) > 50) diff > 0 ? nextImage() : prevImage();
});

// ZOOM
const imageEl = document.getElementById('lightboxImg');

imageEl.addEventListener('wheel', e => {
  e.preventDefault();
  scale += (e.deltaY < 0 ? 0.2 : -0.2);
  scale = Math.max(1, Math.min(scale, 3));
  imageEl.style.transform = `scale(${scale})`;
});

</script>


<script>

// Apply drag + wheel scroll to ALL albums
document.querySelectorAll('.scroll-container').forEach(container => {

  let isDown = false;
  let startX;
  let scrollLeft;

  // =========================
  // 🖱 DRAG SCROLL (DESKTOP)
  // =========================
  container.addEventListener('mousedown', (e) => {
    isDown = true;
    startX = e.pageX - container.offsetLeft;
    scrollLeft = container.scrollLeft;
    container.style.cursor = "grabbing";
  });

  container.addEventListener('mouseleave', () => {
    isDown = false;
    container.style.cursor = "grab";
  });

  container.addEventListener('mouseup', () => {
    isDown = false;
    container.style.cursor = "grab";
  });

  container.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();

    const x = e.pageX - container.offsetLeft;
    const walk = (x - startX) * 2; // speed control
    container.scrollLeft = scrollLeft - walk;
  });

  // =========================
  // 🖱 WHEEL → HORIZONTAL SCROLL
  // =========================
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    container.scrollLeft += e.deltaY;
  }, { passive: false });

  // =========================
  // 📱 TOUCH IMPROVEMENT (SMOOTH FEEL)
  // =========================
  let touchStartX = 0;

  container.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  });

  container.addEventListener('touchmove', (e) => {
    const touchX = e.touches[0].clientX;
    const diff = touchStartX - touchX;
    container.scrollLeft += diff * 0.5;
    touchStartX = touchX;
  });

});
</script>
