<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDRRMO Landing Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="./images/mdr.PNG" />
 <style>

    @font-face {
    font-family: 'DMSerif';
    src: url('./fonts/DMSerif-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    }

    /* Optional: create a class to use easily */
    .font-dmserif {
    font-family: 'DMSerif', serif;
    }

    /* 3D Flip Animation */
    .flip-logo {
    transform-style: preserve-3d;
    animation: flipSide 7s infinite linear;
    display: block;
    margin-left: auto;
    margin-right: auto;
    }

    @keyframes flipSide {
    0%   { transform: rotateY(-90deg); }
    50%  { transform: rotateY(90deg); }
    100% { transform: rotateY(-90deg); }
    }

    /* Optional: neon glow pulse */
    .flip-logo {
    box-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e, 0 0 60px #22c55e;
    }
</style>
</head>

<body class="bg-black">


  <!-- HERO -->
<section class="pt-32 pb-12 text-center px-4 flex flex-col items-center justify-center">

<a href="dashboard.html">
 <img src="./images/mdr.PNG" 
     alt="MDRRMO Logo"
    class="flip-logo w-48 h-48 sm:w-56 sm:h-56 md:w-64 md:h-64 lg:w-72 lg:h-72
            border-8 border-green-500 rounded-full
            shadow-[0_0_40px_#22c55e] mb-6 mx-auto">


 <h1 class="text-3xl md:text-3xl font-dmserif font-extrabold text-[#FF0000] text-center shadow-md shadow-red-400/30 px-4 py-2 rounded-lg  px-4 rounded-lg">
    MDRRMO - ROSARIO, CAVITE
 </h1>
</a>
</section>

  <!-- FOOTER -->
 <footer class="p-2 mt-4 text-center text-xs text-gray-400 bg-black">

</footer>
</body>
</html>
