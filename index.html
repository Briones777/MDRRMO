<!DOCTYPE html>
<html lang="en">
<head>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="MDRRMO Dashboard - Emergency Response System">
  <meta property="og:description" content="Real-time disaster monitoring and incident reporting system.">
  <meta property="og:image" content="https://briones777.github.io/MDRRMO/images/mdr.PNG">
  <meta property="og:url" content="https://briones777.github.io/MDRRMO/">
  <meta property="og:type" content="website">
  <title>MDRRMO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./images/mdr.PNG" />
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <style>
    @font-face {
      font-family: 'DMSerif';
      src: url('./fonts/DMSerif-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    .font-dmserif {
      font-family: 'DMSerif', serif;
    }

    /* 3D Flip Animation */
    .flip-logo {
      transform-style: preserve-3d;
      animation: flipSide 7s infinite linear;
      display: block;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 20px #091413, 0 0 40px #091413, 0 0 60px #091413;
      position: relative;
      z-index: 3;
    }

    @keyframes flipSide {
      0%   { transform: rotateY(-90deg); }
      50%  { transform: rotateY(90deg); }
      100% { transform: rotateY(-90deg); }
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: -1;
    }
  </style>
</head>

<body class="bg-black text-white overflow-hidden">

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop playsinline class="video-bg">
    <source src="./images/rain.mp4" type="video/mp4">
    Your browser does not support video.
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- HERO -->
  <section class="min-h-screen flex flex-col items-center justify-center text-center px-4">

    <a href="dashboard.html">
      <img src="./images/mdr.PNG" 
        alt="MDRRMO Logo"
        class="flip-logo w-48 h-48 sm:w-56 sm:h-56 md:w-64 md:h-64 lg:w-72 lg:h-72
               border-8 border-green-600 rounded-full mb-6 mx-auto">

    <h1 class="text-3xl md:text-4xl font-dmserif font-extrabold text-[#FF0000]
               shadow-sm shadow-[#FF0000] px-6 py-3 rounded-lg bg-black/30 backdrop-blur-sm">
      MDRRMO - ROSARIO, CAVITE
    </h1>
	</a>

  </section>

  <!-- FOOTER -->
  <footer class="absolute bottom-0 w-full p-3 mt-16 text-center text-xs font-semibold text-gray-400 bg-black/40 backdrop-blur-sm">
    © 2026 MDRRMO - Rosario, Cavite | All Rights Reserved
  </footer>

</body>
</html>
